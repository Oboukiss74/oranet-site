name: Deploy to LWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_ORANET }}
          username: ${{ secrets.FTP_USERNAME_ORANET }}
          password: ${{ secrets.FTP_PASSWORD_ORANET }}
          server-dir: /public_html/oranet.ovisiondigital.com/boukiss226/

          exclude: |
            **/.git*
            **/.git*/**
            .github/**